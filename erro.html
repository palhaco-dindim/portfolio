<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dindim | Página em Construção</title>
    <link rel="stylesheet" href="erro.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body class="error-page">

    <div class="error-container">
        <div class="error-card">
            
            <!-- Lado Esquerdo: Imagem do Dindim Triste -->

                    <img src="imgs/dindim-triste.png" alt="Dindim triste"> <!-- Use a imagem do palhaço chorando -->
                </div>
            </div>

            <!-- Lado Direito: Mensagem -->
            <div class="error-content">
                <h1>Sentimos muito! Ainda estamos trabalhando nesta página.</h1>
                <p>Agradecemos seu interesse em dar uma olhada no trabalho do Dindim. Logo estará disponível!</p>
                
                <div class="error-footer">
                    <a href="index.html" class="btn-voltar">Voltar</a>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
